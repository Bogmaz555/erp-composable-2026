apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-service
  namespace: erp
  labels:
    app: finance-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finance-service
  template:
    metadata:
      labels:
        app: finance-service
    spec:
      containers:
        - name: finance-service
          image: erp/finance:latest
          ports:
            - containerPort: 4010
          env:
            - name: NATS_URL
              value: nats://nats:4222
          livenessProbe:
            httpGet:
              path: /fin/health
              port: 4010
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /fin/health
              port: 4010
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: finance-service
  namespace: erp
spec:
  selector:
    app: finance-service
  ports:
    - port: 4010
      targetPort: 4010
  type: ClusterIP
