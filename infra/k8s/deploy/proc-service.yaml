apiVersion: apps/v1
kind: Deployment
metadata:
  name: proc-service
  namespace: erp
  labels:
    app: proc-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: proc-service
  template:
    metadata:
      labels:
        app: proc-service
    spec:
      containers:
        - name: proc-service
          image: erp/proc-service:latest
          ports:
            - containerPort: 4004
          env:
            - name: NATS_URL
              value: nats://nats:4222
          livenessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: proc-service
  namespace: erp
spec:
  selector:
    app: proc-service
  ports:
    - port: 4004
      targetPort: 4004
  type: ClusterIP
