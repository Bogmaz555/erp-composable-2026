apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: erp
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: erp/api-gateway:latest
          ports:
            - containerPort: 4005
          env:
            - name: AUTH_ENFORCE
              value: "true"
          livenessProbe:
            httpGet:
              path: /
              port: 4005
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 4005
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: erp
spec:
  selector:
    app: api-gateway
  ports:
    - port: 4005
      targetPort: 4005
  type: ClusterIP
