apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: erp
  labels:
    app: analytics-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: erp/analytics-service:latest
          ports:
            - containerPort: 4011
          env:
            - name: NATS_URL
              value: nats://nats:4222
          livenessProbe:
            httpGet:
              path: /health
              port: 4011
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 4011
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: erp
spec:
  selector:
    app: analytics-service
  ports:
    - port: 4011
      targetPort: 4011
  type: ClusterIP
