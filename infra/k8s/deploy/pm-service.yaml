apiVersion: apps/v1
kind: Deployment
metadata:
  name: pm-service
  namespace: erp
  labels:
    app: pm-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pm-service
  template:
    metadata:
      labels:
        app: pm-service
    spec:
      containers:
        - name: pm-service
          image: erp/pm-service:latest
          ports:
            - containerPort: 4002
          env:
            - name: NATS_URL
              value: nats://nats:4222
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pm-service
  namespace: erp
spec:
  selector:
    app: pm-service
  ports:
    - port: 4002
      targetPort: 4002
  type: ClusterIP
