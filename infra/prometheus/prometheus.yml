global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: erp-analytics-bi
    metrics_path: /bi/metrics/retention/prometheus
    static_configs:
      - targets: ['host.docker.internal:4011']
        labels:
          service: analytics-service
          domain: bi-snapshot
