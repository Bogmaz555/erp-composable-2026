apiVersion: apps/v1
kind: Deployment
metadata:
  name: quality-service
  namespace: erp-apps
  labels:
    app: quality-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quality-service
  template:
    metadata:
      labels:
        app: quality-service
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "erp-apps"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/erp/quality-service"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/erp/quality-service" -}}
          {{ range $k, $v := .Data.data }}
          export {{ $k }}="{{ $v }}"
          {{ end }}
          {{- end -}}
    spec:
      serviceAccountName: erp-apps-sa
      containers:
      - name: quality-service
        image: quality-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3007
        env:
        - name: PORT
          value: "3007"
        command: ["/bin/sh", "-c"]
        args:
        - |
          source /vault/secrets/config || true
          npm run start
        livenessProbe:
          httpGet:
            path: /health
            port: 3007
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3007
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: quality-service
  namespace: erp-apps
spec:
  selector:
    app: quality-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3007
