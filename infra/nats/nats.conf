# ═══════════════════════════════════════════════════════════════════════════════
# NATS JetStream Configuration — ERP Composable 2026
# Montowany jako /etc/nats/nats-server.conf w kontenerze
# ═══════════════════════════════════════════════════════════════════════════════

# Klient
port: 4222
max_payload: 8MB

# Monitoring HTTP
http_port: 8222

# JetStream — trwały storage dla event-driven architecture
jetstream {
  store_dir: "/data"
  max_mem: 256MB
  max_file: 1GB
}

# Logowanie
debug: false
trace: false
logtime: true
