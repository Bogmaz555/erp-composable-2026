{{- if .Values.analyticsService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: analytics-service
    {{- include "erp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.analyticsService.replicaCount }}
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: {{ .Values.analyticsService.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.analyticsService.port }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.analyticsService.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.analyticsService.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: analytics-service
  ports:
    - port: {{ .Values.analyticsService.port }}
      targetPort: {{ .Values.analyticsService.port }}
  type: ClusterIP
{{- end }}
